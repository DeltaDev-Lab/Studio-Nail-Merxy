<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Studio Nail Merxy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,200,0,0" />
</head>
<body>

    <header class="header">
        <div class="nav-contenedor">
            <div class="marca">
                <img src="../Img/logo.jpeg" alt="Logo Studio Nail Merxy" class="logo">
                <h1 class="titulo-logo">Studio Nail Merxy</h1>
            </div>
            <nav class="menu">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="servicios.html">Servicios</a></li>
                    <li><a href="formulario_contacto.html" class="activo">Contacto</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contenedor-formulario">
        <div class="caja-formulario">
            <h2 class="titulo-seccion text-center">Agenda tu Cita</h2>
            <p class="subtitulo">Ingresa tus datos y pronto habrá una confirmación.</p>
            
            <form action="#" class="formulario">
                <div class="campo">
                    <label for="nombre">Nombre Completo</label>
                    <input type="text" id="nombre" name="nombre" required pattern="[A-Za-záéíóúÁÉÍÓÚñÑ\s]+" title="Solo se permiten letras y espacios">
                </div>
                <div class="campo">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" name="correo" required pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Ingrese un correo válido">
                </div>
                <div class="campo">
                    <label for="tel">Número de Teléfono</label>
                    <input type="tel" id="tel" name="tel" required pattern="[0-9]{8,12}" title="Debe ingresar un número de teléfono válido">
                </div>
                <div class="campo">
                    <label for="servicio_select">Servicio a Solicitar</label>
                    <select id="servicio_select" name="servicio_select" required>
                        <option value="">Seleccione una opción</option>
                        <option value="unas">Uñas / Manicura</option>
                        <option value="pedicura">Pedicura</option>
                        <option value="capilar">Cuidado Capilar</option>
                        <option value="facial">Rostro / Depilación</option>
                    </select>
                </div>
                <div class="campo">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="4" required></textarea>
                </div>
                <button type="submit" class="boton w-100">Enviar Solicitud</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <div class="info-footer">
            <div class="item">
                <span class="material-symbols-outlined">call</span>
                <p>+505 8791 0277</p>
            </div>
            <div class="item">
                <span class="material-symbols-outlined">location_on</span>
                <p>Managua, Nicaragua</p>
            </div>
        </div>
        <p class="copyright">&copy; 2026 Studio Nail Merxy.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
